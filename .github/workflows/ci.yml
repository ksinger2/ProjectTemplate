# CI Pipeline — Build, Test, Lint
# Update the commands below to match your project's stack.
# See CLAUDE.md for project-specific build/test/lint commands.

name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
